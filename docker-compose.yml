version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soundviral-backend
    ports:
      - "7860:7860"
    environment:
      - FLASK_ENV=production
      - FLASK_PORT=7860
      - DATABASE_PATH=/app/data/users.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soundviral-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
